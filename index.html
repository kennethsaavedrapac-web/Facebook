<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Facebook</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fb2018/css/main.css">
  <link rel="stylesheet" href="fb2018/css/feed.css">
  <link rel="stylesheet" href="fb2018/css/profile.css">
  <link rel="stylesheet" href="fb2018/css/messenger.css">
  <link rel="stylesheet" href="fb2018/css/notifications.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1877F2">
  <meta name="description" content="Aplicación Facebook - Conecta con amigos y familiares">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231877F2' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>f</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231877F2' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>f</text></svg>">
</head>
<body>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <span id="clock">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" fill="white"/><rect x="4" y="2" width="3" height="10" fill="white"/><rect x="8" y="1" width="3" height="11" fill="white"/><rect x="12" y="0" width="3" height="12" fill="white"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 24" fill="white"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="2" y="3" width="15" height="6" rx="1" fill="white"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="white"/></svg>
    </div>
  </div>

  <!-- TOP BAR (Blue search bar) -->
  <header id="topbar-blue">
    <button class="topbar-icon-btn" id="btn-camera" aria-label="Camera">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13" r="4"/>
        <path d="M9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9z"/>
      </svg>
    </button>
    <div id="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Buscar" readonly>
    </div>
    <button class="topbar-icon-btn" id="btn-messenger" aria-label="Messenger">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.36 2 2 6.13 2 11.7c0 2.91 1.2 5.5 3.16 7.36V22l2.86-1.57c.82.23 1.68.35 2.58.35h.4c5.64 0 10-4.13 10-9.68C21 6.13 17.64 2 12 2zm1.08 13.02l-2.55-2.73L5.68 15l4.85-5.13 2.55 2.73L17.86 10l-4.78 5.02z"/>
      </svg>
      <span class="badge hidden" id="msg-badge">2</span>
    </button>
  </header>

  <!-- TAB BAR (White) -->
  <nav id="tab-bar">
    <button class="tab active" data-screen="feed" aria-label="Home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1m-2 0h2"/>
      </svg>
    </button>
    <button class="tab" data-screen="friends" aria-label="Friends">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
    </button>
    <button class="tab" data-screen="marketplace" aria-label="Marketplace">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 3h18v4l-2 2.5a3.5 3.5 0 01-5 0L12 7l-2 2.5a3.5 3.5 0 01-5 0L3 7V3z"/>
        <path d="M5 9.5V21h14V9.5"/>
        <path d="M9 21V14h6v7"/>
      </svg>
    </button>
    <button class="tab" data-screen="notifications" aria-label="Notifications">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span class="badge hidden" id="notif-badge">3</span>
    </button>
    <button class="tab" data-screen="menu" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span class="menu-dot"></span>
    </button>
    <div id="tab-indicator"></div>
  </nav>

  <!-- SCREENS -->
  <main id="app">

    <!-- FEED -->
    <section id="screen-feed" class="screen active">
      <div class="ptr-loading">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
      </div>
      <div class="ptr-container">
        <div id="stories-bar"><!-- populated by JS --></div>
        <div id="create-post-bar">
          <img src="https://i.pravatar.cc/40?img=12" alt="You" class="avatar">
          <button class="create-post-input">¿Qué estás pensando?</button>
        </div>
        <div id="feed-posts"><!-- populated by JS --></div>
      </div>
    </section>

    <!-- FRIENDS -->
    <section id="screen-friends" class="screen">
      <div class="screen-header"><h2>Amigos</h2></div>
      <div id="friends-list"><!-- populated by JS --></div>
    </section>

    <!-- MARKETPLACE -->
    <section id="screen-marketplace" class="screen">
      <div class="screen-header"><h2>Marketplace</h2></div>
      <div id="marketplace-grid"><!-- populated by JS --></div>
    </section>

    <!-- NOTIFICATIONS -->
    <section id="screen-notifications" class="screen">
      <div class="screen-header"><h2>Notificaciones</h2></div>
      <div id="notif-list"><!-- populated by JS --></div>
    </section>

    <!-- MENU -->
    <section id="screen-menu" class="screen">
      <div id="menu-profile-row">
        <img src="fb2018/Perfil/PerfilFoto.png" alt="Tu perfil" class="avatar-lg">
        <div>
          <div class="menu-name">Mile</div>
          <div class="menu-sub">Ver tu perfil</div>
        </div>
      </div>
    </section>

    <!-- PROFILE (overlay) -->
    <section id="screen-profile" class="screen overlay hidden">
      <header class="profile-header">
        <button class="profile-back-btn" id="profile-back-btn" aria-label="Atrás">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="profile-header-title">Mile</div>
      </header>
      <div class="profile-scroll-container">
        <div id="profile-content"><!-- populated by JS --></div>
      </div>
    </section>

    <!-- ALBUM (overlay) -->
    <section id="screen-album" class="screen overlay hidden">
      <header class="profile-header">
        <button class="profile-back-btn" id="album-back-btn" aria-label="Atrás">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="profile-header-title">Fotos de Mile</div>
      </header>
      <div class="album-scroll-container">
        <div id="album-content"><!-- populated by JS --></div>
      </div>
    </section>

    <!-- MESSENGER -->
    <section id="screen-messenger" class="screen overlay hidden">
      <button class="back-btn" data-back>←</button>
      <div id="messenger-content"><!-- populated by JS --></div>
    </section>

    <!-- PHOTO VIEWER -->
    <div id="photo-viewer" class="hidden">
      <button id="photo-close">✕</button>
      <img id="photo-img" src="" alt="">
    </div>

    <!-- COMMENTS SHEET -->
    <div id="comments-sheet" class="hidden">
      <div id="comments-header">
        <span>Comentarios</span>
        <button id="comments-close">✕</button>
      </div>
      <div id="comments-list"></div>
      <div id="comments-input-row">
        <img src="https://i.pravatar.cc/32?img=12" alt="You" class="avatar-sm">
        <input type="text" id="comment-input" placeholder="Escribe un comentario…">
        <button id="comment-send">Enviar</button>
      </div>
    </div>
    <div id="comments-backdrop" class="hidden"></div>

    <!-- REACTION PICKER -->
    <div id="reaction-picker" class="hidden">
      <button data-reaction="like">👍</button>
      <button data-reaction="love">❤️</button>
      <button data-reaction="haha">😂</button>
      <button data-reaction="wow">😮</button>
      <button data-reaction="sad">😢</button>
      <button data-reaction="angry">😡</button>
    </div>

    <!-- NOTIFICATION BANNER -->
    <div id="notif-banner" class="hidden"></div>

  </main>

  <script src="fb2018/js/data.js"></script>
  <script src="fb2018/js/feed.js"></script>
  <script src="fb2018/js/profile.js"></script>
  <script src="fb2018/js/messenger.js"></script>
  <script src="fb2018/js/notifications.js"></script>
  <script src="fb2018/js/router.js"></script>
  <script src="fb2018/js/main.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then((registration) => {
            console.log('✓ Service Worker registrado:', registration);
            
            // Comprobar actualizaciones cada hora
            setInterval(() => {
              registration.update();
            }, 3600000);
            
            // Notificar cuando hay actualización disponible
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('Nueva versión disponible');
                  // Opcional: mostrar notificación al usuario
                }
              });
            });
          })
          .catch((error) => {
            console.log('✗ Error al registrar Service Worker:', error);
          });
      });
    }
  </script>
</body>
</html>
